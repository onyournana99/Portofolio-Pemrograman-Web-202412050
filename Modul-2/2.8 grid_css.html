<!DOCTYPE html>
<html>
<head>
    <style>
        .grid-container {
            display: grid;
            grid-template-columns: 100px 200px 100px;
            grid-template-rows: 50px 100px;
            gap: 15px;
            background-color: #f2f2f2;
            padding: 10px;
        }

        .grid-item {
            color: white;
            text-align: center;
            padding: 20px;
            font-size: 18px;
        }

        .grid-item:nth-child(1) { background-color: #ff0000; }
        .grid-item:nth-child(2) { background-color: #f9f900; }
        .grid-item:nth-child(3) { background-color: #67ff02; }
        .grid-item:nth-child(4) { background-color: #00aff4; }
        .grid-item:nth-child(5) { background-color: #ff43f9; }
        .grid-item:nth-child(6) {
            background-color: #ff7777;
            grid-column: span 2;
        }
    </style>
</head>
<body>
    <div class="grid-container">
        <div class="grid-item">1</div>
        <div class="grid-item">2</div>
        <div class="grid-item">3</div>
        <div class="grid-item">4</div>
        <div class="grid-item">5</div>
        <div class="grid-item">6</div>
    </div>
</body>
</html>
