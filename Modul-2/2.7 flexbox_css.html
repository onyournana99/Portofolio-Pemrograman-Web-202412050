<!DOCTYPE html> 
<html> 
<head> 
    <style> 
        .container { 
            display: flex; 
            justify-content: space-between; 
            align-items: center;            
            background-color: #f0f0f0;     
            min-height: 200px;              
            border: 2px dashed #cf8080;        
        } 
        
        .item { 
            background-color: rgb(136, 176, 236); 
            color: white;                    
            padding: 25px;                   
            margin: 10px;                    
            font-weight: bold;
            border-radius: 5px;              
        } 
    </style> 
</head> 
<body> 

    <div class="container"> 
        <div class="item">Item A</div> 
        <div class="item">Item B</div> 
        <div class="item">Item C</div> 
    </div> 

</body> 
</html>
