<!DOCTYPE html>
<html lang="en">
<head>
  <title>Bootstrap Basic Table</title>
  <meta charset="utf-8">

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet">
  <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</head>

<body>

    <h2>Basic Table</h2>

        </tr>
      </thead>

      <tbody>
        <tr>
          <td>naila</td>

          <td>naila@gmail.com</td>
        </tr>

        <tr>
          <td>haechan</td>
          <td>lee</td>
          <td>haechan@gmail.com</td>
        </tr>

        <tr>
          <td>ucup</td>
          <td>soleh</td>
          <td>ucup@gmail.com</td>
        </tr>
      </tbody>
    </table>
  </div>
</body>
</html>
